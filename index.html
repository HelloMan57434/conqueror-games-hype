<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conqueror Games | HQ</title>

    <script defer src="https://cloud.umami.is/script.js" data-website-id="41baa0c4-0432-43d3-ab0d-56bf8f7a4c96"></script>

    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        h1 { font-size: 3.5rem; letter-spacing: 5px; text-shadow: 0 0 15px #ff0000; margin: 10px; text-transform: uppercase; }
        .desc { max-width: 450px; color: #888; font-style: italic; border-left: 3px solid #ff0000; padding: 15px; margin: 20px; background: rgba(255,0,0,0.05); line-height: 1.6; }
        #meter-bg { width: 85%; max-width: 500px; height: 45px; background: #111; border: 2px solid #333; border-radius: 10px; overflow: hidden; position: relative; }
        #hype-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #800, #f00); transition: 0.5s; box-shadow: 0 0 25px #f00; }
        #rank { margin-top: 25px; font-weight: bold; color: #ff0000; letter-spacing: 2px; text-transform: uppercase; }
        button { margin-top: 40px; padding: 18px 50px; background: #f00; color: #fff; border: none; font-weight: bold; cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s; }
        button:hover { background: #fff; color: #f00; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>CONQUEROR GAMES</h1>
    <div class="desc">WE DON'T JUST PLAY. WE CONQUER.</div>

    <div id="meter-bg"><div id="hype-fill"></div></div>
    <div id="rank">RANK: NOVICE CHALLENGER 🎮</div>

    <button onclick="boostHype()">BOOST THE HYPE 🔥</button>

    <script>
        let hype = parseInt(localStorage.getItem('conquerorHype')) || 0;
        updateUI();

        function boostHype() {
            if (hype < 100) {
                hype += 10;
                localStorage.setItem('conquerorHype', hype);
                updateUI();
                if (window.umami) { umami.track('Hype-Boost-Click'); }
            }
        }

        function updateUI() {
            const fill = document.getElementById('hype-fill');
            const rankText = document.getElementById('rank');
            fill.style.width = hype + "%";
            let r = "NOVICE CHALLENGER 🎮";
            if (hype >= 30) r = "RISING WARRIOR ⚔️";
            if (hype >= 70) r = "ELITE CONQUEROR 🛡️";
            if (hype >= 100) { r = "SUPREME OVERLORD 👑"; rankText.style.color = "gold"; }
            rankText.innerText = "RANK: " + r;
        }

        // SECRET ADMIN RESET: Press 'R' on your keyboard to reset
        window.addEventListener('keydown', (e) => {
            if (e.key === 'R' || e.key === 'r') {
                let pass = prompt("ADMIN PASSWORD:");
                if (pass === "reset") {
                    localStorage.removeItem('conquerorHype');
                    location.reload();
                }
            }
        });
    </script>
</body>
</html>
