<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conqueror Games | Official HQ</title>

    <script defer src="https://cloud.umami.is/script.js" data-website-id="41baa0c4-0432-43d3-ab0d-56bf8f7a4c96"></script>

    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            text-align: center;
            overflow-x: hidden;
        }

        h1 { 
            font-size: 3.5rem; 
            letter-spacing: 8px; 
            text-transform: uppercase; 
            text-shadow: 0 0 20px #ff0000; 
            margin-bottom: 5px; 
        }

        .subtitle { 
            color: #888; 
            margin-bottom: 30px; 
            letter-spacing: 3px; 
            font-weight: bold;
        }

        .description-box {
            max-width: 500px;
            background: rgba(255, 0, 0, 0.05);
            border-left: 4px solid #ff0000;
            padding: 20px;
            margin-bottom: 40px;
            color: #ccc;
            line-height: 1.6;
        }

        #meter-bg {
            width: 85%;
            max-width: 600px;
            height: 50px;
            background: #111;
            border: 3px solid #222;
            border-radius: 5px;
            position: relative;
            box-shadow: inset 0 0 10px #000;
        }

        #hype-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #800000, #ff0000);
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 30px #ff0000;
        }

        #rank { 
            margin-top: 30px; 
            font-size: 1.3rem; 
            font-weight: bold; 
            color: #ff0000; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        button {
            margin-top: 50px;
            padding: 22px 60px;
            font-size: 1.2rem;
            background: #ff0000;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: all 0.3s ease;
        }

        button:hover { 
            background: #ffffff; 
            color: #ff0000; 
            box-shadow: 0 0 50px #ffffff; 
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>CONQUEROR GAMES</h1>
    <p class="subtitle">WE DON'T JUST PLAY. WE CONQUER.</p>

    <div class="description-box">
        Welcome to the official <strong>Conqueror Games</strong> HQ. 
        Boost the Hype Meter to help us launch our first major project! 
        Your progress is saved to your device.
    </div>

    <div id="meter-bg">
        <div id="hype-fill"></div>
    </div>

    <div id="rank">RANK: NOVICE CHALLENGER 🎮</div>

    <button onclick="boostHype()">Boost the Hype 🔥</button>

    <script>
        // Check for saved hype or start at 0
        let hype = parseInt(localStorage.getItem('conquerorHype')) || 0;
        
        // Run UI update immediately so the bar stays where it was
        updateUI();

        function boostHype() {
            if (hype < 100) {
                hype += 10;
                localStorage.setItem('conquerorHype', hype); // Saves to device
                updateUI();
                
                // Sends a "ping" to your Umami Dashboard
                if (window.umami) {
                    umami.track('Hype-Boost-Click');
                }
            } else {
                alert("MAX HYPE REACHED! THE CONQUERORS ARE READY.");
            }
        }

        function updateUI() {
            const fill = document.getElementById('hype-fill');
            const rankText = document.getElementById('rank');
            
            fill.style.width = hype + "%";
            
            let rankName = "NOVICE CHALLENGER 🎮";
            if (hype >= 30) rankName = "RISING WARRIOR ⚔️";
            if (hype >= 70) rankName = "ELITE CONQUEROR 🛡️";
            if (hype >= 100) {
                rankName = "SUPREME OVERLORD 👑";
                rankText.style.color = "#FFD700";
                rankText.style.textShadow = "0 0 15px gold";
            }
            
            rankText.innerText = "RANK: " + rankName;
        }
    </script>
</body>
</html>
